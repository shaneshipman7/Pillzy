<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pill Tracker Pro</title>
    <style>
        :root {
            --bg: #f4f7f6; --card: #ffffff; --text: #333;
            --primary: #2563eb; --success: #059669; --warn: #d97706; --danger: #dc2626;
            --gray: #9ca3af; --light-gray: #e5e7eb;
        }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 80px; }
        .container { max-width: 500px; margin: 0 auto; }
        
        h2 { font-size: 1.2rem; margin: 20px 0 10px; display: flex; justify-content: space-between; align-items: center; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        
        /* Inputs */
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid var(--light-gray); font-size: 1rem; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        button:disabled { background: var(--gray); opacity: 0.6; }
        button.sec { background: var(--light-gray); color: var(--text); }
        button.danger { background: var(--danger); }
        
        /* Grid Items */
        .med-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--light-gray); }
        .med-row:last-child { border-bottom: none; }
        .med-info { flex: 1; }
        .med-name { font-weight: 600; }
        .med-meta { font-size: 0.85rem; color: var(--gray); }
        
        /* Indicators */
        .btn-check { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--light-gray); color: var(--light-gray); font-size: 1.2rem; margin-left: 10px; cursor: pointer; flex-shrink: 0; }
        .btn-check.done { background: var(--success); border-color: var(--success); color: white; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        
        /* Log Table */
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { text-align: left; color: var(--gray); font-weight: normal; padding-bottom: 8px; }
        td { padding: 8px 0; border-top: 1px solid var(--light-gray); }

        /* Toast */
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.9rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 1000; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Thyroid <span id="thy-badge" style="font-size: 0.9rem; font-weight: normal;"></span></h2>
        <button id="btn-thy-now" onclick="markThyroidNow()">Log Thyroid Now</button>
    </div>

    <h2>Morning <button class="sec" style="width: auto; padding: 5px 10px;" id="btn-all-morning" onclick="takeAll('morning')">Take All</button></h2>
    <div class="card" id="morning-list"></div>

    <h2>Evening <button class="sec" style="width: auto; padding: 5px 10px;" id="btn-all-evening" onclick="takeAll('evening')">Take All</button></h2>
    <div class="card" id="evening-list"></div>

    <div id="section-asneeded" style="display:none;">
        <h2>As Needed</h2>
        <div class="card" id="asneeded-list"></div>
    </div>

    <h2>Today's Log</h2>
    <div class="card">
        <div id="no-log" style="color: var(--gray); text-align: center;">No doses logged yet.</div>
        <table id="log-table" style="display:none;">
            <thead><tr><th>Med</th><th>Time</th><th>Slot</th></tr></thead>
            <tbody id="log-body"></tbody>
        </table>
    </div>

    <h2>Manage Meds</h2>
    <div class="card">
        <input type="text" id="f-name" placeholder="Medication Name">
        <input type="text" id="f-dose" placeholder="Dose (e.g. 50mg)">
        <select id="f-time" onchange="toggleExtraFields()">
            <option value="morning">Morning</option>
            <option value="evening">Evening</option>
            <option value="both">Both (AM/PM)</option>
            <option value="asneeded">As Needed</option>
        </select>
        <div id="extra-asneeded" style="display:none;">
            <input type="number" id="f-minhours" placeholder="Min hours between doses">
            <input type="number" id="f-maxdaily" placeholder="Max doses per day">
        </div>
        <button id="btn-add" onclick="addMed()">Add Medication</button>
        <div id="meds-list" style="margin-top: 15px;"></div>
    </div>

    <div style="margin-top: 30px;">
        <button class="sec" onclick="backupData()">Download Backup</button>
        <button class="sec danger" style="margin-top: 10px;" onclick="clearAllData()">Clear All Data</button>
    </div>
</div>

<div id="toast"></div>

<script>
// --- DB CORE ---
const DB_NAME = 'PillTrackerDB_v2';
const DB_VER = 1;
let db, meds = [], intakes = {}, thyroid = { date: null, ts: null };

async function init() {
    db = await new Promise((res, rej) => {
        const req = indexedDB.open(DB_NAME, DB_VER);
        req.onupgradeneeded = e => e.target.result.createObjectStore('store');
        req.onsuccess = e => res(e.target.result);
        req.onerror = () => rej(req.error);
    });
    await loadAll();
    renderAll();
}

const dbGet = k => new Promise(res => {
    const tx = db.transaction('store', 'readonly');
    const req = tx.objectStore('store').get(k);
    req.onsuccess = () => res(req.result);
});

const dbSet = (k, v) => new Promise(res => {
    const tx = db.transaction('store', 'readwrite');
    tx.objectStore('store').put(v, k).onsuccess = () => res();
});

async function loadAll() {
    meds = (await dbGet('meds')) || [];
    intakes = (await dbGet('intakes')) || {};
    thyroid = (await dbGet('thyroid')) || { date: null, ts: null };
}

// --- LOGIC ---
const todayKey = () => new Date().toISOString().split('T')[0];
const fmtTime = ts => new Date(ts).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });

async function markTaken(idx, slot) {
    const ts = Date.now();
    // Unique key: YYYY-MM-DD-INDEX-SLOT-TIMESTAMP
    const key = `${todayKey()}-${idx}-${slot}-${ts}`;
    intakes[key] = true;
    await dbSet('intakes', intakes);
    renderAll();
    showToast('Logged!');
}

async function markThyroidNow() {
    const ts = Date.now();
    thyroid = { date: todayKey(), ts };
    await dbSet('thyroid', thyroid);
    // Log it as a generic intake for the history list
    const key = `${todayKey()}-thyroid-Morning-${ts}`;
    intakes[key] = true;
    await dbSet('intakes', intakes);
    renderAll();
    showToast('Thyroid Logged');
}

function isTakenToday(idx, slot) {
    const prefix = `${todayKey()}-${idx}-${slot}`;
    return Object.keys(intakes).some(k => k.startsWith(prefix));
}

async function takeAll(slot) {
    const now = Date.now();
    let count = 0;
    meds.forEach((m, i) => {
        const match = (slot === 'morning' && (m.time === 'morning' || m.time === 'both')) || 
                      (slot === 'evening' && (m.time === 'evening' || m.time === 'both'));
        if (match && !isTakenToday(i, slot)) {
            intakes[`${todayKey()}-${i}-${slot}-${now + i}`] = true;
            count++;
        }
    });
    if (count) {
        await dbSet('intakes', intakes);
        renderAll();
        showToast(`Took ${count} pills`);
    }
}

// --- UI RENDERING ---
function renderAll() {
    renderThyroid();
    renderList('morning-list', 'morning');
    renderList('evening-list', 'evening');
    renderAsNeeded();
    renderLog();
    renderSettingsList();
}

function renderThyroid() {
    const badge = document.getElementById('thy-badge');
    const btn = document.getElementById('btn-thy-now');
    if (thyroid.date === todayKey()) {
        const elapsed = Math.floor((Date.now() - thyroid.ts) / 60000);
        const rem = Math.max(0, 30 - elapsed);
        badge.innerHTML = rem > 0 ? `${fmtTime(thyroid.ts)} (${rem}m left)` : `${fmtTime(thyroid.ts)} (Clear ✓)`;
        btn.disabled = true;
    } else {
        badge.innerHTML = "";
        btn.disabled = false;
    }
}

function renderList(id, slot) {
    const el = document.getElementById(id);
    const list = meds.filter(m => m.time === slot || m.time === 'both');
    if (!list.length) return el.innerHTML = '<div style="color:#ccc">None</div>';
    
    el.innerHTML = meds.map((m, i) => {
        if (m.time !== slot && m.time !== 'both') return '';
        const done = isTakenToday(i, slot);
        return `
            <div class="med-row">
                <div class="med-info">
                    <div class="med-name">${m.name}</div>
                    <div class="med-meta">${m.dose || ''}</div>
                </div>
                <div class="btn-check ${done ? 'done' : ''}" onclick="markTaken(${i}, '${slot}')">
                    ${done ? '✓' : '+'}
                </div>
            </div>`;
    }).join('');
}

function renderAsNeeded() {
    const sec = document.getElementById('section-asneeded');
    const el = document.getElementById('asneeded-list');
    const list = meds.filter(m => m.time === 'asneeded');
    sec.style.display = list.length ? 'block' : 'none';
    
    el.innerHTML = meds.map((m, i) => {
        if (m.time !== 'asneeded') return '';
        return `
            <div class="med-row">
                <div class="med-info">
                    <div class="med-name">${m.name}</div>
                    <div class="med-meta">${m.dose || ''}</div>
                </div>
                <button style="width:auto" onclick="markTaken(${i}, 'asneeded')">Log Dose</button>
            </div>`;
    }).join('');
}

function renderLog() {
    const entries = Object.keys(intakes)
        .filter(k => k.startsWith(todayKey()))
        .map(k => {
            const p = k.split('-');
            const isThy = p[1] === 'thyroid';
            const name = isThy ? 'Thyroid' : (meds[p[1]]?.name || 'Unknown');
            return { name, slot: p[2], ts: parseInt(p[3]) };
        }).sort((a,b) => a.ts - b.ts);

    document.getElementById('no-log').style.display = entries.length ? 'none' : 'block';
    document.getElementById('log-table').style.display = entries.length ? 'table' : 'none';
    document.getElementById('log-body').innerHTML = entries.map(e => `
        <tr><td>${e.name}</td><td>${fmtTime(e.ts)}</td><td>${e.slot}</td></tr>
    `).join('');
}

function renderSettingsList() {
    document.getElementById('meds-list').innerHTML = meds.map((m, i) => `
        <div class="med-row" style="font-size:0.8rem">
            <span>${m.name} (${m.time})</span>
            <span style="color:red" onclick="deleteMed(${i})">Delete</span>
        </div>
    `).join('');
}

// --- MANAGEMENT ---
async function addMed() {
    const name = document.getElementById('f-name').value;
    if (!name) return;
    meds.push({
        name,
        dose: document.getElementById('f-dose').value,
        time: document.getElementById('f-time').value
    });
    await dbSet('meds', meds);
    document.getElementById('f-name').value = '';
    renderAll();
}

async function deleteMed(i) {
    if(confirm('Delete?')) {
        meds.splice(i, 1);
        await dbSet('meds', meds);
        renderAll();
    }
}

async function clearAllData() {
    if(confirm('Wipe everything?')) {
        await indexedDB.deleteDatabase(DB_NAME);
        location.reload();
    }
}

function toggleExtraFields() {
    document.getElementById('extra-asneeded').style.display = 
        document.getElementById('f-time').value === 'asneeded' ? 'block' : 'none';
}

function showToast(m) {
    const t = document.getElementById('toast');
    t.textContent = m; t.className = 'show';
    setTimeout(() => t.className = '', 2000);
}

function backupData() {
    const data = JSON.stringify({meds, intakes, thyroid});
    const blob = new Blob([data], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `med-backup-${todayKey()}.json`;
    a.click();
}

init();
</script>
</body>
</html>
