<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pills">
  <meta name="theme-color" content="#0a0a0a">
  <title>Pill Tracker</title>

  <style>
    :root {
      --yellow: #facc15; --green: #22c55e; --red: #ef4444; --blue: #3b82f6;
      --bg: #0a0a0a; --card: #141414; --card2: #1a1a1a; --row: #1e1e1e;
      --border: #252525; --border2: #2a2a2a; --text: #e0e0e0; --muted: #666; --dim: #444;
      --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;
      background: var(--bg); color: var(--text); margin: 0; padding: 0;
      padding-top: calc(var(--safe-top) + 16px); padding-bottom: calc(var(--safe-bottom) + 24px);
      padding-left: 14px; padding-right: 14px; line-height: 1.45; min-height: 100dvh;
    }
    h1 { text-align: center; color: var(--yellow); margin: 0 0 18px; font-size: 1.45em; font-weight: 700; }
    .section { background: var(--card); border-radius: 14px; padding: 14px 15px; margin-bottom: 11px; border: 1px solid var(--border); }
    h2 { margin: 0 0 10px; font-size: 0.95em; color: #999; font-weight: 600; text-transform: uppercase; }
    .note { color: #4a4a4a; font-size: 0.78em; margin: 0 0 10px; }
    button {
      background: var(--yellow); color: #000; border: none; padding: 12px 16px; font-size: 0.95em;
      border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%; margin: 5px 0;
    }
    button.blu { background: var(--blue); color: #fff; }
    button.danger { background: #6b1a1a; color: #fca5a5; border: 1px solid #7a2020; }
    button.sec { background: #222; color: #ccc; border: 1px solid #333; }
    button.sm { width: auto; padding: 5px 13px; font-size: 0.8em; margin: 0; border-radius: 7px; }
    input, select { width: 100%; padding: 10px 12px; border-radius: 9px; border: 1px solid #2c2c2c; background: var(--card2); color: var(--text); margin-bottom: 9px; }
    .pill-row { display: flex; align-items: center; gap: 11px; padding: 11px 12px; background: var(--row); border-radius: 10px; margin-bottom: 7px; border: 1px solid var(--border2); }
    .circle { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #3a3a3a; background: #222; display: flex; align-items: center; justify-content: center; cursor: pointer; color: transparent; }
    .circle.on { background: var(--green); border-color: var(--green); color: #fff; }
    .circle.add { color: #555; font-size: 18px; border-style: dashed; }
    .pill-info { flex: 1; min-width: 0; }
    .pill-name { font-size: 0.95em; font-weight: 500; }
    .pill-name.taken { color: #3a6a3a; text-decoration: line-through; }
    .pill-dose { font-size: 0.78em; color: var(--muted); }
    .thy-badge { font-size: 0.78em; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
    .thy-warn { background: #2a2000; color: var(--yellow); }
    .thy-good { background: #0a2a0a; color: var(--green); }
    .med-item { display: flex; align-items: center; gap: 9px; padding: 9px 11px; background: var(--card2); border-radius: 9px; margin-bottom: 6px; }
    .extra { display: none; }
    #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1c1c1c; padding: 10px 22px; border-radius: 22px; opacity: 0; transition: 0.3s; z-index: 1000; border: 1px solid #333; }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

  <h1>💊 Pill Tracker</h1>

  <div class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
      <h2 style="margin:0;">Thyroid</h2>
      <div id="thy-badge"></div>
    </div>
    <div style="display:flex; gap:8px;">
      <button id="btn-thy-now" onclick="markThyroidNow()">Taken Now</button>
      <button class="sec" onclick="openThyModal()">Earlier</button>
    </div>
  </div>

  <div class="section">
    <h2>Morning Pills</h2>
    <div id="morning-list"></div>
    <button id="btn-all-morning" onclick="takeAll('morning')" style="margin-top:6px;">Take All Morning</button>
  </div>

  <div class="section">
    <h2>Evening Pills</h2>
    <div id="evening-list"></div>
    <button id="btn-all-evening" onclick="takeAll('evening')" style="margin-top:6px;">Take All Evening</button>
  </div>

  <div class="section" id="section-asneeded" style="display:none;">
    <h2>As Needed</h2>
    <div id="asneeded-list"></div>
  </div>

  <div class="section" id="section-preventive" style="display:none;">
    <h2>Preventive</h2>
    <div id="preventive-list"></div>
  </div>

  <div class="section">
    <div onclick="toggleSection('manage')" style="cursor:pointer; display:flex; justify-content:space-between;">
      <h2>Manage Medications</h2>
      <span id="icon-manage">+</span>
    </div>
    <div id="body-manage" style="display:none; margin-top:12px;">
      <input id="f-name" placeholder="Name">
      <input id="f-dose" placeholder="Dose (e.g. 50mg)">
      <select id="f-time" onchange="toggleExtraFields()">
        <option value="morning">Morning only</option>
        <option value="evening">Evening only</option>
        <option value="both">Morning + Evening</option>
        <option value="asneeded">As Needed</option>
        <option value="preventive">Preventive</option>
      </select>
      <div class="extra" id="extra-asneeded">
        <input id="f-minhours" type="number" placeholder="Min hours between">
        <input id="f-maxdaily" type="number" placeholder="Max doses per 24h">
      </div>
      <button id="btn-submit" onclick="addMed()">Add Medication</button>
      <div id="meds-list" style="margin-top:16px;"></div>
    </div>
  </div>

  <div class="section">
    <div onclick="toggleSection('log')" style="cursor:pointer; display:flex; justify-content:space-between;">
      <h2 id="log-title">Today's Log</h2>
      <span id="icon-log">+</span>
    </div>
    <div id="body-log" style="display:none; margin-top:12px;">
      <table id="log-table">
        <tbody id="log-body"></tbody>
      </table>
    </div>
  </div>

  <div id="toast"></div>

<script>
const DB_NAME = 'PillTrackerDB_v1';
let db;
let meds = [];
let intakes = {};
let thyroid = { date: null, ts: null };
let editingIndex = null;

function openDB() {
  return new Promise((res) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('store');
    req.onsuccess = e => { db = e.target.result; res(); };
  });
}

async function dbGet(k) { return new Promise(res => {
  const req = db.transaction('store','readonly').objectStore('store').get(k);
  req.onsuccess = () => res(req.result);
});}

async function dbSet(k, v) { return new Promise(res => {
  const req = db.transaction('store','readwrite').objectStore('store').put(v, k);
  req.onsuccess = () => res();
});}

function todayKey() { return new Date().toISOString().split('T')[0]; }
function fmtTime(ts) { return new Date(ts).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }); }

function fmtSlot(s) {
  const m = { morning: 'Morning', evening: 'Evening', both: 'AM/PM', asneeded: 'As Needed', preventive: 'Preventive' };
  return m[s] || s;
}

async function loadAll() {
  meds = (await dbGet('meds')) || [];
  intakes = (await dbGet('intakes')) || {};
  thyroid = (await dbGet('thyroid')) || { date: null, ts: null };
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.className = 'show';
  setTimeout(() => t.className = '', 2000);
}

function toggleSection(id) {
  const b = document.getElementById('body-' + id);
  const i = document.getElementById('icon-' + id);
  const open = b.style.display === 'none';
  b.style.display = open ? 'block' : 'none';
  i.textContent = open ? '−' : '+';
}

function toggleExtraFields() {
  const v = document.getElementById('f-time').value;
  document.getElementById('extra-asneeded').style.display = v === 'asneeded' ? 'block' : 'none';
}

function startEdit(i) {
  const m = meds[i]; editingIndex = i;
  document.getElementById('f-name').value = m.name;
  document.getElementById('f-dose').value = m.dose || '';
  document.getElementById('f-time').value = m.time;
  toggleExtraFields();
  document.getElementById('btn-submit').textContent = "Save Changes";
  document.getElementById('btn-submit').className = "blu";
}

async function addMed() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) return;
  const med = {
    name, dose: document.getElementById('f-dose').value.trim(),
    time: document.getElementById('f-time').value,
    minHours: document.getElementById('f-minhours').value || 0
  };
  if (editingIndex !== null) { meds[editingIndex] = med; editingIndex = null; }
  else { meds.push(med); }
  await dbSet('meds', meds);
  document.getElementById('f-name').value = '';
  document.getElementById('f-dose').value = '';
  document.getElementById('btn-submit').textContent = "Add Medication";
  document.getElementById('btn-submit').className = "";
  renderAll();
}

async function markTaken(idx, slot) {
  const key = todayKey() + '-' + idx + '-' + slot + '-' + Date.now();
  intakes[key] = true; await dbSet('intakes', intakes); renderAll();
}

function renderDailyList(id, slot) {
  const el = document.getElementById(id);
  const list = meds.map((m, i) => ({m, i})).filter(({m}) => (slot==='morning' && (m.time==='morning'||m.time==='both')) || (slot==='evening' && (m.time==='evening'||m.time==='both')));
  el.innerHTML = list.map(({m, i}) => {
    const done = Object.keys(intakes).some(k => k.startsWith(todayKey() + '-' + i + '-' + slot));
    return `<div class="pill-row ${done?'done':''}">
      <div class="circle ${done?'on':''}" onclick="${done?'':'markTaken('+i+',\''+slot+'\')'}">${done?'✓':''}</div>
      <div class="pill-info">
        <div class="pill-name ${done?'taken':''}">${m.name}</div>
        <div class="pill-dose">${m.dose || ''}</div>
      </div>
    </div>`;
  }).join('');
}

function renderAsNeeded() {
  const list = meds.map((m, i) => ({m, i})).filter(({m}) => m.time === 'asneeded');
  document.getElementById('section-asneeded').style.display = list.length ? 'block' : 'none';
  document.getElementById('asneeded-list').innerHTML = list.map(({m, i}) => `
    <div class="pill-row">
      <div class="circle add" onclick="markTaken(${i},'asneeded')">+</div>
      <div class="pill-info">
        <div class="pill-name">${m.name} ${m.dose ? '('+m.dose+')' : ''}</div>
      </div>
    </div>`).join('');
}

function renderMedsList() {
  document.getElementById('meds-list').innerHTML = meds.map((m, i) => `
    <div class="med-item">
      <div class="pill-info">
        <div>${m.name} ${m.dose ? '('+m.dose+')' : ''}</div>
        <div class="med-slot">${fmtSlot(m.time)}</div>
      </div>
      <button class="sm blu" onclick="startEdit(${i})">Edit</button>
    </div>`).join('');
}

function renderAll() {
  renderDailyList('morning-list', 'morning');
  renderDailyList('evening-list', 'evening');
  renderAsNeeded();
  renderMedsList();
}

openDB().then(async () => { await loadAll(); renderAll(); });
</script>
</body>
</html>
