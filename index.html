<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pill Tracker</title>
    <style>
        :root {
            --bg: #0a0a0a; --card: #141414; --border: #252525; --text: #e0e0e0;
            --red: #ef4444; --yellow: #facc15; --green: #22c55e; --blue: #3b82f6; --purple: #a855f7;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 16px; padding-bottom: 100px; }
        .section { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 16px; border: 1px solid var(--border); }
        h1 { text-align: center; color: var(--yellow); font-size: 1.5rem; margin-bottom: 20px; }
        h2 { font-size: 0.8rem; text-transform: uppercase; color: #666; margin: 0 0 12px; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center; }
        input, select { width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 10px; border: 1px solid var(--border); background: #1a1a1a; color: #fff; box-sizing: border-box; font-size: 16px; }
        button { border: none; border-radius: 10px; padding: 12px; font-weight: 700; cursor: pointer; width: 100%; margin: 4px 0; }
        .btn-blue { background: var(--blue); color: #fff; }
        .btn-green { background: var(--green); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid #333; color: #aaa; font-size: 0.8rem; padding: 6px; }
        .pill-row { display: flex; align-items: center; gap: 12px; padding: 12px; background: #1e1e1e; border-radius: 12px; margin-bottom: 8px; border: 1px solid #2a2a2a; }
        .pill-info { flex: 1; }
        .status-badge { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; margin-top: 4px; display: block; }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; padding: 12px 24px; border-radius: 30px; opacity: 0; transition: 0.3s; z-index: 999; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

    <h1>💊 Pill Tracker</h1>

    <div id="thyroid-alert" style="display:none;" class="section">
        <div style="color:var(--purple); font-weight:bold; text-align:center;">
            ⏳ Empty Stomach: <span id="thyroid-timer">60</span> mins remaining
        </div>
    </div>

    <div class="section">
        <h2>Quick Take All</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
            <button class="btn-blue" onclick="takeAll('morning')">Morning</button>
            <button class="btn-blue" onclick="takeAll('afternoon')">After</button>
            <button class="btn-blue" onclick="takeAll('evening')">Evening</button>
        </div>
    </div>

    <div class="section">
        <h2 onclick="toggle('log-content')" style="cursor:pointer">Today's Log <span id="log-count"></span></h2>
        <div id="log-content"></div>
    </div>

    <div class="section">
        <h2 onclick="toggle('manage-content')" style="cursor:pointer">Manage Meds <span>+</span></h2>
        <div id="manage-content" style="display:none; margin-top:10px;">
            <input id="f-name" placeholder="Medication Name">
            <input id="f-dose" placeholder="Dose (e.g. 50mg)">
            <select id="f-type" onchange="toggleExtra()">
                <option value="morning">Morning</option>
                <option value="afternoon">Afternoon</option>
                <option value="evening">Evening</option>
                <option value="both">Morning & Evening</option>
                <option value="asneeded">As Needed</option>
                <option value="thyroid">Thyroid (Empty Stomach)</option>
                <option value="effectiveness">Effectiveness (6-Day Build)</option>
            </select>
            
            <div id="extra-asneeded" style="display:none;">
                <input id="f-p1" type="number" placeholder="Period 1 Hours (Yellow)">
                <input id="f-p2" type="number" placeholder="Period 2 Hours (Green)">
            </div>

            <button class="btn-green" id="save-btn" onclick="saveMed()">Add Medication</button>
            <div id="med-list-container" style="margin-top:15px;"></div>
        </div>
    </div>

    <div class="section">
        <button class="btn-outline" onclick="exportData()">Export Data</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
        <button class="btn-outline" onclick="document.getElementById('importFile').click()">Import Data</button>
    </div>

    <div id="toast"></div>

    <script>
        let meds = JSON.parse(localStorage.getItem('meds') || '[]');
        let intakes = JSON.parse(localStorage.getItem('intakes') || '[]');
        let editIdx = null;

        function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }
        function toggle(id){ const e=document.getElementById(id); e.style.display = (e.style.display==='none' || e.style.display==='') ?'block':'none'; }
        
        function toggleExtra() {
            const type = document.getElementById('f-type').value;
            document.getElementById('extra-asneeded').style.display = (type === 'asneeded') ? 'block' : 'none';
        }

        function getDayKey() {
            const now = new Date();
            if (now.getHours() < 3) now.setDate(now.getDate() - 1);
            return now.toISOString().split('T')[0];
        }

        function saveMed() {
            const name = document.getElementById('f-name').value.trim();
            if(!name) return showToast("Enter a name");
            const med = {
                name, 
                dose: document.getElementById('f-dose').value.trim(),
                type: document.getElementById('f-type').value,
                p1: parseFloat(document.getElementById('f-p1').value) || 0,
                p2: parseFloat(document.getElementById('f-p2').value) || 0
            };
            if(editIdx !== null) meds[editIdx] = med; else meds.push(med);
            localStorage.setItem('meds', JSON.stringify(meds));
            editIdx = null; document.getElementById('save-btn').textContent = "Add Medication";
            clearForm(); render();
        }

        function clearForm(){ 
            ['f-name','f-dose','f-p1','f-p2'].forEach(id=>document.getElementById(id).value=''); 
            document.getElementById('f-type').value = 'morning';
            toggleExtra();
        }

        function takeMed(idx) {
            intakes.push({ idx, ts: Date.now(), day: getDayKey() });
            localStorage.setItem('intakes', JSON.stringify(intakes));
            render(); showToast("Logged");
        }

        function takeAll(slot) {
            meds.forEach((m, i) => {
                if(m.type === slot || (m.type === 'both' && (slot === 'morning' || slot === 'evening'))) {
                    intakes.push({ idx: i, ts: Date.now(), day: getDayKey() });
                }
            });
            localStorage.setItem('intakes', JSON.stringify(intakes));
            render();
        }

        function deleteLog(ts) {
            intakes = intakes.filter(i => i.ts !== ts);
            localStorage.setItem('intakes', JSON.stringify(intakes));
            render();
        }

        function render() {
            const now = Date.now();
            const today = getDayKey();
            
            document.getElementById('med-list-container').innerHTML = meds.map((m, i) => `
                <div class="pill-row">
                    <div class="pill-info"><b>${m.name}</b> <small>${m.dose}</small></div>
                    <button class="btn-green" style="width:auto; padding:8px 15px;" onclick="takeMed(${i})">Take</button>
                    <button class="btn-outline" style="width:auto;" onclick="startEdit(${i})">Edit</button>
                </div>
            `).join('');

            const todaysLogs = intakes.filter(i => i.day === today).sort((a,b) => b.ts - a.ts);
            document.getElementById('log-count').textContent = `(${todaysLogs.length})`;
            
            const lastThyroid = todaysLogs.find(l => meds[l.idx]?.type === 'thyroid');
            if(lastThyroid && (now - lastThyroid.ts) < 3600000) {
                document.getElementById('thyroid-alert').style.display = 'block';
                document.getElementById('thyroid-timer').textContent = 60 - Math.floor((now - lastThyroid.ts)/60000);
            } else {
                document.getElementById('thyroid-alert').style.display = 'none';
            }

            document.getElementById('log-content').innerHTML = todaysLogs.map(l => {
                const m = meds[l.idx];
                if(!m) return '';
                let status = '';
                
                if(m.type === 'asneeded') {
                    const hrs = (now - l.ts) / 3600000;
                    let color = 'var(--red)', label = 'Red';
                    if(hrs >= m.p2) { color = 'var(--green)'; label = 'Green'; }
                    else if(hrs >= m.p1) { color = 'var(--yellow)'; label = 'Yellow'; }
                    status = `<span class="status-badge" style="color:${color}">${label} (${hrs.toFixed(1)}h ago)</span>`;
                }

                if(m.type === 'effectiveness') {
                    const daysUsed = new Set(intakes.filter(x => x.idx === l.idx).map(x => x.day)).size;
                    let color = 'var(--red)', label = 'Red';
                    if(daysUsed >= 6) { color = 'var(--green)'; label = 'Green'; }
                    else if(daysUsed >= 4) { color = 'var(--yellow)'; label = 'Yellow'; }
                    status = `<span class="status-badge" style="color:${color}">Day ${daysUsed}: ${label}</span>`;
                }

                return `
                <div class="pill-row">
                    <div class="pill-info">
                        <div class="pill-name">${m.name} <small>at ${new Date(l.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</small></div>
                        ${status}
                    </div>
                    <button class="btn-outline" style="width:auto; color:var(--red); border:none;" onclick="deleteLog(${l.ts})">X</button>
                </div>`;
            }).join('');
        }

        function startEdit(i) {
            editIdx = i; const m = meds[i];
            document.getElementById('f-name').value = m.name;
            document.getElementById('f-dose').value = m.dose;
            document.getElementById('f-type').value = m.type;
            document.getElementById('f-p1').value = m.p1 || '';
            document.getElementById('f-p2').value = m.p2 || '';
            document.getElementById('save-btn').textContent = "Save Changes";
            toggleExtra();
            document.getElementById('manage-content').style.display = 'block';
        }

        function exportData() {
            const blob = new Blob([JSON.stringify({meds, intakes})], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `pills_backup.json`; a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = JSON.parse(event.target.result);
                meds = data.meds || []; intakes = data.intakes || [];
                localStorage.setItem('meds', JSON.stringify(meds));
                localStorage.setItem('intakes', JSON.stringify(intakes));
                render(); showToast("Imported");
            };
            reader.readAsText(e.target.files[0]);
        }

        setInterval(render, 30000);
        render();
    </script>
</body>
</html>
