<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pills">
  <meta name="theme-color" content="#0a0a0a">
  <title>Pill Tracker</title>

  <style>
    :root {
      --yellow: #facc15; --green: #22c55e; --red: #ef4444; --blue: #3b82f6;
      --bg: #0a0a0a; --card: #141414; --card2: #1a1a1a; --row: #1e1e1e;
      --border: #252525; --border2: #2a2a2a; --text: #e0e0e0; --muted: #666;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    body {
      font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text);
      margin: 0; padding: calc(var(--safe-top) + 16px) 14px calc(var(--safe-bottom) + 24px);
    }
    h1 { text-align: center; color: var(--yellow); font-size: 1.45em; margin: 0 0 18px; }
    .section { background: var(--card); border-radius: 14px; padding: 14px 15px; margin-bottom: 11px; border: 1px solid var(--border); }
    h2 { margin: 0 0 10px; font-size: 0.95em; color: #999; text-transform: uppercase; }
    .note { color: #4a4a4a; font-size: 0.78em; margin: 0 0 10px; }
    button {
      background: var(--yellow); color: #000; border: none; padding: 12px; border-radius: 10px;
      font-weight: 700; width: 100%; margin: 5px 0; font-family: inherit;
    }
    button.sec { background: #222; color: #ccc; border: 1px solid #333; }
    button.danger { background: #6b1a1a; color: #fca5a5; }
    button.sm { width: auto; padding: 5px 13px; font-size: 0.8em; margin: 0; }
    .btn-row { display: flex; gap: 8px; }
    .btn-row button { flex: 1; }
    input, select { width: 100%; padding: 10px; border-radius: 9px; border: 1px solid #2c2c2c; background: var(--card2); color: var(--text); margin-bottom: 9px; }
    .pill-row { display: flex; align-items: center; gap: 11px; padding: 11px 12px; background: var(--row); border-radius: 10px; margin-bottom: 7px; border: 1px solid var(--border2); }
    .pill-row.done { background: #101a10; border-color: #1c331c; }
    .circle { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #3a3a3a; display: flex; align-items: center; justify-content: center; font-weight: 800; color: transparent; cursor: pointer; }
    .circle.on { background: var(--green); border-color: var(--green); color: #fff; }
    .circle.add.blocked { background: #1a0a0a; border-color: #3a1515; }
    .pill-info { flex: 1; }
    .pill-name.taken { color: #3a6a3a; text-decoration: line-through; }
    .thy-badge { font-size: 0.78em; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
    .thy-warn { background: #2a2000; color: var(--yellow); }
    .thy-good { background: #0a2a0a; color: var(--green); }
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 900; align-items: flex-end; justify-content: center; }
    .modal-bg.open { display: flex; }
    .modal-box { background: #181818; border-radius: 18px 18px 0 0; padding: 22px 20px; width: 100%; max-width: 460px; border: 1px solid #2a2a2a; }
    #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1c1c1c; padding: 10px 22px; border-radius: 22px; opacity: 0; transition: 0.3s; pointer-events: none; border: 1px solid #333; z-index: 1000; }
    #toast.show { opacity: 1; }
    .extra { display: none; }
    .med-item { display: flex; align-items: center; gap: 9px; padding: 9px; background: var(--card2); border-radius: 9px; margin-bottom: 6px; }
  </style>
</head>
<body>

  <h1>💊 Pill Tracker</h1>

  <div class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
      <h2 style="margin:0;">Thyroid</h2>
      <div id="thy-badge"></div>
    </div>
    <p class="note">Empty stomach. Wait 30 min before food or other pills.</p>
    <div class="btn-row">
      <button id="btn-thy-now" onclick="markThyroidNow()">Taken Now</button>
      <button class="sec" onclick="openThyModal()">Taken Earlier</button>
    </div>
  </div>

  <div class="section">
    <h2>Morning Pills</h2>
    <div id="morning-list"></div>
    <button id="btn-all-morning" onclick="takeAll('morning')">Take All Morning</button>
  </div>

  <div class="section">
    <h2>Evening Pills</h2>
    <div id="evening-list"></div>
    <button id="btn-all-evening" onclick="takeAll('evening')">Take All Evening</button>
  </div>

  <div class="section" id="section-asneeded" style="display:none;">
    <h2>As Needed</h2>
    <div id="asneeded-list"></div>
  </div>

  <div class="section">
    <h2 onclick="toggleSection('manage')" style="cursor:pointer">Manage Medications [+]</h2>
    <div id="body-manage" style="display:none; margin-top:10px;">
      <input id="f-name" placeholder="Name (required)">
      <input id="f-dose" placeholder="Dose (optional)">
      <select id="f-time" onchange="toggleExtraFields()">
        <option value="morning">Morning only</option>
        <option value="evening">Evening only</option>
        <option value="both">Morning + Evening</option>
        <option value="asneeded">As Needed</option>
      </select>

      <div class="extra" id="extra-asneeded">
        <input id="f-minhours" type="number" placeholder="Min hours wait">
        <input id="f-maxdaily" type="number" placeholder="Max doses per 24h">
      </div>

      <button onclick="addMed()">Add Medication</button>
      <div id="meds-list" style="margin-top:15px;"></div>
      <button class="danger" style="margin-top:20px;" onclick="clearAllData()">Clear All Data</button>
    </div>
  </div>

  <div class="modal-bg" id="thy-modal">
    <div class="modal-box">
      <h3>When did you take it?</h3>
      <input type="time" id="thy-time-input">
      <button onclick="saveThyroidTime()">Save</button>
      <button class="sec" onclick="closeThyModal()">Cancel</button>
    </div>
  </div>

  <div id="toast"></div>

<script>
let db, meds = [], intakes = {}, thyroid = { date: null, ts: null };
const todayKey = () => new Date().toISOString().split('T')[0];
const fmtTime = (ts) => new Date(ts).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });

async function init() {
  const req = indexedDB.open('PillTrackerDB', 1);
  req.onupgradeneeded = e => e.target.result.createObjectStore('store');
  req.onsuccess = async e => {
    db = e.target.result;
    meds = await dbGet('meds') || [];
    intakes = await dbGet('intakes') || {};
    thyroid = await dbGet('thyroid') || { date: null, ts: null };
    renderAll();
  };
}

function dbGet(k) {
  return new Promise(res => {
    const t = db.transaction('store', 'readonly').objectStore('store').get(k);
    t.onsuccess = () => res(t.result);
  });
}

function dbSet(k, v) {
  return new Promise(res => {
    const t = db.transaction('store', 'readwrite').objectStore('store').put(v, k);
    t.onsuccess = () => res();
  });
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function toggleSection(id) {
  const b = document.getElementById('body-' + id);
  b.style.display = b.style.display === 'none' ? 'block' : 'none';
}

function toggleExtraFields() {
  const v = document.getElementById('f-time').value;
  document.getElementById('extra-asneeded').style.display = v === 'asneeded' ? 'block' : 'none';
}

function renderAll() {
  renderThyroid();
  renderDaily('morning-list', 'morning');
  renderDaily('evening-list', 'evening');
  renderAsNeeded();
  renderMedsList();
}

function renderThyroid() {
  const b = document.getElementById('thy-badge');
  const btn = document.getElementById('btn-thy-now');
  if (thyroid.date === todayKey()) {
    btn.disabled = true;
    const diff = Math.floor((Date.now() - thyroid.ts) / 60000);
    const rem = Math.max(0, 30 - diff);
    b.innerHTML = `<span class="thy-badge ${rem > 0 ? 'thy-warn' : 'thy-good'}">${fmtTime(thyroid.ts)} · ${rem > 0 ? rem + 'm left' : 'Clear ✓'}</span>`;
  }
}

function renderDaily(id, slot) {
  const el = document.getElementById(id);
  const list = meds.filter(m => m.time === slot || m.time === 'both');
  el.innerHTML = list.length ? '' : '<p class="note">None added</p>';
  list.forEach((m, i) => {
    const done = intakes[todayKey() + '-' + m.name + '-' + slot];
    el.innerHTML += `<div class="pill-row ${done ? 'done' : ''}">
      <div class="circle ${done ? 'on' : ''}" onclick="markTaken('${m.name}', '${slot}')">${done ? '✓' : ''}</div>
      <div class="pill-info"><div class="pill-name ${done ? 'taken' : ''}">${m.name}</div></div>
    </div>`;
  });
}

function renderAsNeeded() {
  const sec = document.getElementById('section-asneeded');
  const list = meds.filter(m => m.time === 'asneeded');
  sec.style.display = list.length ? 'block' : 'none';
  const el = document.getElementById('asneeded-list');
  el.innerHTML = '';
  list.forEach(m => {
    el.innerHTML += `<div class="pill-row">
      <div class="circle on" onclick="markTaken('${m.name}', 'asneeded')">+</div>
      <div class="pill-info"><div>${m.name}</div></div>
    </div>`;
  });
}

function renderMedsList() {
  const el = document.getElementById('meds-list');
  el.innerHTML = meds.map((m, i) => `<div class="med-item">
    <div style="flex:1">${m.name} (${m.time})</div>
    <button class="sm danger" onclick="deleteMed(${i})">Del</button>
  </div>`).join('');
}

async function markTaken(name, slot) {
  intakes[todayKey() + '-' + name + '-' + slot] = Date.now();
  await dbSet('intakes', intakes);
  renderAll();
}

async function addMed() {
  const name = document.getElementById('f-name').value;
  if (!name) return;
  meds.push({ name, time: document.getElementById('f-time').value });
  await dbSet('meds', meds);
  renderAll();
  showToast('Added!');
}

async function deleteMed(i) {
  meds.splice(i, 1);
  await dbSet('meds', meds);
  renderAll();
}

async function markThyroidNow() {
  thyroid = { date: todayKey(), ts: Date.now() };
  await dbSet('thyroid', thyroid);
  renderAll();
}

function openThyModal() { document.getElementById('thy-modal').classList.add('open'); }
function closeThyModal() { document.getElementById('thy-modal').classList.remove('open'); }

async function saveThyroidTime() {
  const v = document.getElementById('thy-time-input').value;
  if (!v) return;
  const d = new Date(); d.setHours(v.split(':')[0], v.split(':')[1]);
  thyroid = { date: todayKey(), ts: d.getTime() };
  await dbSet('thyroid', thyroid);
  closeThyModal();
  renderAll();
}

async function clearAllData() {
  if (confirm('Clear everything?')) {
    await dbSet('meds', []); await dbSet('intakes', {}); await dbSet('thyroid', {});
    location.reload();
  }
}

init();
</script>
</body>
</html>
